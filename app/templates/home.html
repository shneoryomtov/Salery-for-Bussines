{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body text-center">
                <h1 class="card-title">ברוכים הבאים למחשבון הכנסה לעצמאיים</h1>
                <p class="card-text">כלי לחישוב ההכנסה הנטו של עצמאיים בישראל, כולל מיסים, ביטוח לאומי והוצאות מוכרות.</p>
                {% if not current_user.is_authenticated %}
                    <a href="{{ url_for('auth.register') }}" class="btn btn-primary btn-lg">התחל עכשיו</a>
                {% else %}
                    <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary btn-lg">לוח הבקרה שלי</a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
